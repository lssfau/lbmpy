stages:
  - "Code Quality"
  - "Unit Tests"
  - "Reporting"
  - "Prerelease-Tests"
  - integration
  - nightly
  - docs
  - deploy

# -------------------- Code Quality ---------------------------------------------------------------------

.qa-base:
  stage: "Code Quality"
  image: i10git.cs.fau.de:5005/pycodegen/pycodegen/nox:alpine
  needs: []
  except:
    variables:
      - $ENABLE_NIGHTLY_BUILDS
  tags:
    - docker

lint:
  extends: .qa-base
  script:
    - nox -s lint


# --------------------------  Tests --------------------------------------------------------------------------------

.testsuite-base:
  stage: "Unit Tests"
  needs: []
  before_script:
    - mkdir -p ~/.config/matplotlib
    - echo "backend:template" > ~/.config/matplotlib/matplotlibrc
  after_script:
    - mv .coverage .coverage.${CI_JOB_ID}
  artifacts:
    when: always
    paths:
      - .coverage.*
      - test-report
    reports:
      junit: report.xml

testsuite-cuda-py3.10:
  extends: .testsuite-base
  image: i10git.cs.fau.de:5005/pycodegen/pycodegen/nox:ubuntu24.04-cuda12.6
  script:
    - nox -s "testsuite-3.10(cupy)"
  tags:
    - docker
    - cuda
    - cudaComputeCapability6.1
    - AVX


testsuite-cpu-py3.13:
  extends: .testsuite-base
  image: i10git.cs.fau.de:5005/pycodegen/pycodegen/nox:alpine
  script:
    - nox -s "testsuite-3.13(cpu)"
  tags:
    - docker
    - AVX


# -------------------- Reporting -------------------------------------------------------------------------

coverage-report:
  image: i10git.cs.fau.de:5005/pycodegen/pycodegen/nox:alpine
  stage: "Reporting"
  script:
    - nox -s "coverage_report"
  coverage: /TOTAL.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/
  tags:
    - docker
  artifacts:
    when: always
    paths:
      - coverage_report
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml


# --------------------------  Nightly and Pre-Release Tests --------------------------------------------------------------------------------

minimal-sympy-master:
  stage: "Prerelease-Tests"
  needs: []
  image: i10git.cs.fau.de:5005/pycodegen/pycodegen/nox:alpine
  script:
    - nox -s quicktest -P 3.13 -- --sympy-master
  allow_failure: true
  tags:
    - docker

